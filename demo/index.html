<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Annoto Loader — Playkit v7 plugin demo</title>
    <!-- Kaltura Player (v7) -->
    <script src="https://unpkg.com/@playkit-js/kaltura-player-js@canary/dist/kaltura-ovp-player.js"></script>
    <!-- The built plugin bundle (served at the root by webpack-dev-server) -->
    <script src="../playkit-plugin-loader.js"></script>
  </head>
  <body>
    <div id="player-placeholder" style="width: 640px; height: 360px"></div>
    <script>
      // Anonymous-only: set your Annoto API key (clientId) below to see the
      // Annoto widget load. The plugin is enabled purely via the `plugins`
      // config — there is NO Annoto <script> on this page, which mirrors how a
      // uiConf-bundled plugin behaves inside the Kaltura IFrame embed.
      const ANNOTO_API_KEY = 'PUT_YOUR_ANNOTO_API_KEY_HERE';

      const config = {
        logLevel: 'DEBUG',
        targetId: 'player-placeholder',
        provider: {},
        playback: {
          autoplay: true
        },
        plugins: {
          'annoto-loader': {
            clientId: ANNOTO_API_KEY,
            region: 'eu'
          }
        }
      };

      const player = KalturaPlayer.setup(config);

      player.setMedia({
        sources: {
          hls: [
            {
              id: '1_ebs5e9cy_19201,applehttp',
              url: 'https://cdnapisec.kaltura.com/p/2215841/sp/221584100/playManifest/entryId/1_ebs5e9cy/protocol/https/format/applehttp/a.m3u8',
              mimetype: 'application/x-mpegURL'
            }
          ]
        }
      });
    </script>
  </body>
</html>
